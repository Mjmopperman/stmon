# Example YAML instructions for UI tools
#
# This file demonstrates how to use UI tools with natural language prompts
# or direct tool calls.
#
# Run with: python example_tool_usage.py -f instructions/ui_example.yaml

ui: schema/ui.yaml

instructions:
  # Create pages for a user management interface
  - prompt: "Create a user list page with a table component"

  - prompt: "Create a user detail page with a detail component"

  - prompt: "Create a user create page with a form component"

  # You can also use direct tool calls:
