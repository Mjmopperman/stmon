name: Deploy to Oracle Cloud

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy-database:
    runs-on: ubuntu-latest
    name: Deploy Database to VM 1
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Database to VM 1
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 92.4.143.135
          username: ${{ secrets.DB_VM_USER }}
          key: ${{ secrets.DB_VM_SSH_KEY }}
          script: |
            cd /home/ubuntu/stmon
            git pull origin master
            
            if docker ps | grep -q postgres; then
              echo "Database running — checking for new migrations..."
              for f in $(ls /home/ubuntu/stmon/db/migrations/*.sql | sort); do
                filename=$(basename $f)
                applied=$(docker exec postgres psql \
                  -U ${{ secrets.DB_USER }} \
                  -d ${{ secrets.DB_NAME }} \
                  -tAc "SELECT count(*) FROM migrations \
                        WHERE filename='$filename'" 2>/dev/null || echo "0")
                applied=$(echo $applied | tr -d '[:space:]')
                if [ "$applied" = "0" ]; then
                  echo "Applying: $filename"
                  docker exec -i postgres psql \
                    -U ${{ secrets.DB_USER }} \
                    -d ${{ secrets.DB_NAME }} < $f
                  docker exec postgres psql \
                    -U ${{ secrets.DB_USER }} \
                    -d ${{ secrets.DB_NAME }} \
                    -c "INSERT INTO migrations (filename) \
                        VALUES ('$filename') ON CONFLICT DO NOTHING"
                  echo "✅ Applied: $filename"
                else
                  echo "⏭️  Skipped: $filename (already applied)"
                fi
              done
            else
              echo "Starting fresh database..."
              docker compose -f docker-compose.db.yml up -d
            fi
            
            echo "✅ Database VM deployed!"

  deploy-application:
    runs-on: ubuntu-latest
    name: Deploy Application to VM 2
    needs: deploy-database
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy Application to VM 2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.151.184.220
          username: ${{ secrets.APP_VM_USER }}
          key: ${{ secrets.APP_VM_SSH_KEY }}
          script: |
            cd /home/ubuntu/stmon
            git pull origin master

            docker compose -f docker-compose.app.yml down
            docker compose -f docker-compose.app.yml build --no-cache
            docker compose -f docker-compose.app.yml up -d

            echo "=== Running Containers ==="
            docker ps

            echo "=== Container Logs (last 30 lines) ==="
            docker logs --tail 30 fastapi-backend || echo "Container not ready yet"

            sleep 10

            echo "=== Health Check ==="
            curl -f http://localhost:8000/health || exit 1

            docker system prune -f
            echo "✅ Application VM deployed!"