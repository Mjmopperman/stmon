models:
  User:
    fields:
      id:
        type: int
        required: false
      email:
        type: str
        required: true
      password_hash:
        type: str
        required: true
      created_at:
        type: datetime
        required: false
      is_active:
        type: bool
        required: false
    description: User model based on user table
  Post:
    fields:
      id:
        type: uuid
        required: true
      title:
        type: str
        required: true
      content:
        type: str
        required: false
      user_id:
        type: uuid
        required: false
      created_at:
        type: datetime
        required: false
      status:
        type: str
        required: false
      updated_at:
        type: datetime
        required: false
      published_at:
        type: datetime
        required: false
    description: Post model based on post table
  Complex:
    fields:
      name:
        type: str
        required: true
      id:
        type: uuid
        required: true
    description: Complex model based on complex table
  Order:
    fields:
      id:
        type: int
        required: false
      user_id:
        type: int
        required: false
      total:
        type: float
        required: true
      created_at:
        type: datetime
        required: false
      status:
        type: str
        required: false
    description: Order model based on order table
  Product:
    fields:
      id:
        type: int
        required: false
      name:
        type: str
        required: true
      price:
        type: float
        required: true
    description: Product model based on product table
