endpoints:
  complex_update_id:
    path: /complex/update/{id}
    method: POST
  product_get_id:
    path: /product/get/{id}
    method: GET
    description: Get a single product by ID
    response: Product
  product_update_id:
    path: /product/update/{id}
    method: POST
    description: Update a product by ID
    request: Product
    response: Product
  product_delete_id:
    path: /product/delete/{id}
    method: DELETE
    description: Delete a product by ID
  post_get_id:
    path: /post/get/{id}
    method: GET
    description: Get a single post by ID
    response: Post
  post_update_id:
    path: /post/update/{id}
    method: POST
    description: Update a post by ID
    request: Post
    response: Post
  post_delete_id:
    path: /post/delete/{id}
    method: DELETE
    description: Delete a post by ID
  user_list:
    path: /user/list
    method: GET
    description: List all user
    response: User[]
    graphql_query: "query {\n    user {\n        id\n            email\n         \
      \   password_hash\n            created_at\n            is_active\n    }\n}"
    graphql_type: query
  user_get:
    path: /user/{id}
    method: GET
    description: Get a single user by ID
    response: User
    graphql_query: "query GetUser($id: Int!) {\n    user(where: {id: {_eq: $id}})\
      \ {\n        id\n            email\n            password_hash\n            created_at\n\
      \            is_active\n    }\n}"
    graphql_type: query
  user_create:
    path: /user
    method: POST
    description: Create a new user
    request: User
    response: User
    graphql_query: "mutation CreateUser($email: String!, $password_hash: String!,\
      \ $is_active: Boolean) {\n    insert_user(objects: {email: $email, password_hash:\
      \ $password_hash, is_active: $is_active}) {\n        returning {\n         \
      \   id\n            email\n            password_hash\n            created_at\n\
      \            is_active\n        }\n    }\n}"
    graphql_type: mutation
  user_update:
    path: /user/{id}
    method: PUT
    description: Update a user by ID
    request: User
    response: User
    graphql_query: "mutation UpdateUser($id: Int!, $changes: user_set_input!) {\n\
      \    update_user(where: {id: {_eq: $id}}, _set: $changes) {\n        returning\
      \ {\n            id\n            email\n            password_hash\n        \
      \    created_at\n            is_active\n        }\n    }\n}"
    graphql_type: mutation
  user_delete:
    path: /user/{id}
    method: DELETE
    description: Delete a user by ID
    graphql_query: "mutation DeleteUser($id: Int!) {\n    delete_user(where: {id:\
      \ {_eq: $id}}) {\n        affected_rows\n    }\n}"
    graphql_type: mutation
  post_list:
    path: /post/list
    method: GET
    description: List all post
    response: Post[]
    graphql_query: "query {\n    post {\n        id\n            title\n         \
      \   content\n            user_id\n            created_at\n            status\n\
      \            updated_at\n            published_at\n    }\n}"
    graphql_type: query
  post_get:
    path: /post/{id}
    method: GET
    description: Get a single post by ID
    response: Post
    graphql_query: "query GetPost($id: uuid!) {\n    post(where: {id: {_eq: $id}})\
      \ {\n        id\n            title\n            content\n            user_id\n\
      \            created_at\n            status\n            updated_at\n      \
      \      published_at\n    }\n}"
    graphql_type: query
  post_create:
    path: /post
    method: POST
    description: Create a new post
    request: Post
    response: Post
    graphql_query: "mutation CreatePost($title: String!, $content: String, $user_id:\
      \ uuid, $status: String) {\n    insert_post(objects: {title: $title, content:\
      \ $content, user_id: $user_id, status: $status}) {\n        returning {\n  \
      \          id\n            title\n            content\n            user_id\n\
      \            created_at\n            status\n            updated_at\n      \
      \      published_at\n        }\n    }\n}"
    graphql_type: mutation
  post_update:
    path: /post/{id}
    method: PUT
    description: Update a post by ID
    request: Post
    response: Post
    graphql_query: "mutation UpdatePost($id: uuid!, $changes: post_set_input!) {\n\
      \    update_post(where: {id: {_eq: $id}}, _set: $changes) {\n        returning\
      \ {\n            id\n            title\n            content\n            user_id\n\
      \            created_at\n            status\n            updated_at\n      \
      \      published_at\n        }\n    }\n}"
    graphql_type: mutation
  post_delete:
    path: /post/{id}
    method: DELETE
    description: Delete a post by ID
    graphql_query: "mutation DeletePost($id: uuid!) {\n    delete_post(where: {id:\
      \ {_eq: $id}}) {\n        affected_rows\n    }\n}"
    graphql_type: mutation
