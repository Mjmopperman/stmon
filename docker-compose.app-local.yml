services:
  backend:
    image: ${DOCKER_IMAGE:-myapp-backend:latest}
    build: .
    container_name: fastapi-backend
    environment:
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      HASURA_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_URL: http://hasura:8080/v1/graphql
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - db-network
      - app-network
    volumes:
      - ./app:/app/app  # Mount code for auto-reload (local dev only)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  hasura:
    image: hasura/graphql-engine:v2.40.0
    container_name: hasura
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"      
      HASURA_GRAPHQL_METADATA_DIR: /hasura-metadata
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - db-network
      - app-network
    depends_on:
      - backend
    volumes:
      - ./hasura/metadata:/hasura-metadata
      - ./hasura/migrations:/hasura-migrations
      

networks:
  app-network:
    driver: bridge
  db-network:
    external: true
    name: stmon_db-network